<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ title or 'TRACKER X' }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body>
  {% if user %}
  <nav class="navbar navbar-expand-lg app-nav sticky-top">
    <div class="container-fluid px-4 app-shell">
      <a class="navbar-brand fw-bold" href="/dashboard"><i class="bi bi-shield-check me-2"></i>TRACKER X</a>
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/cases">Casos</a></li>
          <li class="nav-item"><a class="nav-link" href="/cases/new">Nuevo caso</a></li>
          {% if user.role == 'admin' %}<li class="nav-item"><a class="nav-link" href="/users">Usuarios</a></li>{% endif %}
          <li class="nav-item"><span class="badge role-badge">{{ user.full_name }} · {{ user.role|upper }}</span></li>
          <li class="nav-item"><a class="btn btn-sm btn-outline-light rounded-pill px-3" href="/logout">Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>
  {% endif %}
  <main class="container-fluid px-4 py-4 app-shell">{% block content %}{% endblock %}</main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
